; PlatformIO Project Configuration File
[env:fishbot]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
# 使用 USB 串口上传，速度设置为 921600
upload_speed = 921600 

# 回归 Serial 模式，使用国内镜像
board_build_microros_transport = serial
lib_deps = 
    https://gitee.com/ohhuo/micro_ros_platformio.git
    SCServo
    madhephaestus/ESP32Servo @ ^1.1.8